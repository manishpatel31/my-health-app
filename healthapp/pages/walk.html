<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Walk Tracker — VitalGreen</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Fraunces:ital,wght@0,300;0,600;1,300&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>
<nav class="navbar">
  <a href="../index.html" class="nav-brand"><span class="brand-leaf">🌿</span><span class="brand-name">VitalGreen</span></a>
  <div class="nav-links">
    <a href="../index.html" class="nav-link"><i class="fas fa-home"></i><span>Home</span></a>
    <a href="calories.html" class="nav-link"><i class="fas fa-utensils"></i><span>Calories</span></a>
    <a href="weight.html" class="nav-link"><i class="fas fa-weight-scale"></i><span>Weight</span></a>
    <a href="walk.html" class="nav-link active"><i class="fas fa-person-walking"></i><span>Walk</span></a>
    <a href="insights.html" class="nav-link"><i class="fas fa-chart-line"></i><span>Insights</span></a>
    <a href="tips.html" class="nav-link"><i class="fas fa-lightbulb"></i><span>Tips</span></a>
    <a href="coach.html" class="nav-link"><i class="fas fa-robot"></i><span>Coach</span></a>
  </div>
</nav>

<main class="main-content">
  <div class="page-header">
    <h1 class="page-title">Walk Tracker</h1>
    <p class="page-sub">Log your steps and track calories burned walking</p>
  </div>

  <!-- Steps Ring Today -->
  <div class="card" id="stepsToday">
    <div class="card-title">Today's Steps</div>
    <div class="steps-ring-wrap">
      <div class="steps-ring">
        <svg viewBox="0 0 80 80" width="80" height="80">
          <circle cx="40" cy="40" r="32" fill="none" stroke="var(--green-100)" stroke-width="8"/>
          <circle cx="40" cy="40" r="32" fill="none" stroke="var(--green-400)" stroke-width="8"
            stroke-linecap="round" stroke-dasharray="201" id="stepsArc" stroke-dashoffset="201"/>
        </svg>
        <div class="steps-ring-num" id="stepsRingNum">0</div>
      </div>
      <div class="steps-info">
        <div class="big-num" id="stepsBig">0 <span style="font-size:1rem;font-weight:400;color:var(--muted)">steps</span></div>
        <div class="sub" id="stepsSub" style="color:var(--muted)">Goal: — steps</div>
        <div class="sub" id="stepsCalBurned" style="color:var(--accent);margin-top:0.2rem"></div>
      </div>
    </div>
    <div class="progress-bar-wrap"><div class="progress-bar-fill" id="stepsProgress" style="width:0%;background:linear-gradient(90deg,#9b59b6,#c39bd3)"></div></div>
  </div>

  <!-- Log Walk -->
  <div class="goal-card">
    <h3><i class="fas fa-person-walking" style="margin-right:0.5rem;opacity:0.7"></i>Log a Walk</h3>
    <div class="form-row" style="margin-bottom:0.75rem">
      <div class="form-group">
        <label>Steps</label>
        <input type="number" id="walkSteps" placeholder="e.g. 4500" min="1" max="100000"/>
      </div>
      <div class="form-group">
        <label>Duration (min)</label>
        <input type="number" id="walkDuration" placeholder="e.g. 45" min="1" max="600"/>
      </div>
    </div>
    <div class="form-row" style="margin-bottom:0.75rem">
      <div class="form-group">
        <label>Distance (km)</label>
        <input type="number" id="walkDistance" placeholder="e.g. 3.5" step="0.1" min="0.1"/>
      </div>
      <div class="form-group">
        <label>Date</label>
        <input type="date" id="walkDate"/>
      </div>
    </div>
    <div id="walkCalPreview" style="background:rgba(255,255,255,0.12);border-radius:8px;padding:0.65rem 0.9rem;margin-bottom:0.75rem;font-size:0.85rem;display:none"></div>
    <button class="btn-primary" onclick="logWalk()" id="logWalkBtn"><i class="fas fa-plus"></i> Log Walk</button>
  </div>

  <!-- Goals Settings -->
  <div class="card">
    <div class="card-title">Walk Goals & Plans</div>
    <div class="form-row">
      <div class="form-group">
        <label>Daily Steps Goal</label>
        <input type="number" id="stepsGoalInput" placeholder="e.g. 8000" min="1000" max="30000"/>
      </div>
      <div class="form-group">
        <label>Target (min/day)</label>
        <input type="number" id="walkMinsGoal" placeholder="e.g. 30" min="5" max="300"/>
      </div>
    </div>
    <button class="btn-secondary" onclick="saveWalkGoals()" style="width:100%"><i class="fas fa-save"></i> Save Goals</button>

    <!-- AI Walk Plan -->
    <div style="margin-top:1rem">
      <button class="btn-secondary" onclick="getWalkPlan()" id="walkPlanBtn" style="width:100%;background:var(--green-50)">
        <i class="fas fa-robot"></i> Get AI Walk Plan for Me
      </button>
      <div id="walkPlanResult" style="margin-top:0.75rem;font-size:0.87rem;line-height:1.65;color:var(--ink-soft);display:none"></div>
    </div>
  </div>

  <!-- Walk History -->
  <div class="card">
    <div class="card-title">Walk History</div>
    <div id="walkHistory"><p class="empty-state">No walks logged yet. Start walking!</p></div>
  </div>
</main>

<nav class="bottom-nav">
  <a href="../index.html" class="bnav-link"><i class="fas fa-home"></i><span>Home</span></a>
  <a href="calories.html" class="bnav-link"><i class="fas fa-utensils"></i><span>Calories</span></a>
  <a href="walk.html" class="bnav-link active"><i class="fas fa-person-walking"></i><span>Walk</span></a>
  <a href="insights.html" class="bnav-link"><i class="fas fa-chart-line"></i><span>Insights</span></a>
  <a href="coach.html" class="bnav-link"><i class="fas fa-robot"></i><span>Coach</span></a>
</nav>

<script src="../js/storage.js"></script>
<script src="../js/app.js"></script>
<script>
async function initWalkPage() {
  document.getElementById('walkDate').value = Storage.today();
  const settings = await Storage.getSettings();
  if (settings.dailyStepsGoal) document.getElementById('stepsGoalInput').value = settings.dailyStepsGoal;
  if (settings.walkMinsGoal) document.getElementById('walkMinsGoal').value = settings.walkMinsGoal;
  await refreshWalkData();
  // Preview calories on input
  ['walkSteps','walkDuration','walkDistance'].forEach(id => {
    document.getElementById(id).addEventListener('input', previewCalories);
  });
}

async function refreshWalkData() {
  const [walks, settings] = await Promise.all([Storage.getWalks(), Storage.getSettings()]);
  const todayWalks = walks.filter(w => w.date === Storage.today());
  const totalSteps = todayWalks.reduce((s,w) => s+(w.steps||0), 0);
  const totalCal = todayWalks.reduce((s,w) => s+(w.caloriesBurned||0), 0);
  const goal = settings.dailyStepsGoal || 8000;
  const pct = Math.min(100, Math.round(totalSteps/goal*100));

  document.getElementById('stepsBig').innerHTML = `${totalSteps.toLocaleString()} <span style="font-size:1rem;font-weight:400;color:var(--muted)">steps</span>`;
  document.getElementById('stepsRingNum').textContent = pct + '%';
  document.getElementById('stepsSub').textContent = `Goal: ${goal.toLocaleString()} steps`;
  if (totalCal > 0) document.getElementById('stepsCalBurned').textContent = `~${Math.round(totalCal)} kcal burned`;
  document.getElementById('stepsProgress').style.width = pct + '%';
  // SVG arc: circumference=201, offset=201 means 0%, 0 means 100%
  document.getElementById('stepsArc').style.strokeDashoffset = 201 - (201 * pct/100);

  renderWalkHistory(walks.slice(0,20));
}

function stepsToCalories(steps, weightKg) {
  // ~0.04 kcal per step per 70kg person, scaled
  const w = weightKg || 70;
  return Math.round(steps * 0.04 * (w/70));
}

async function previewCalories() {
  const steps = parseInt(document.getElementById('walkSteps').value) || 0;
  const mins = parseInt(document.getElementById('walkDuration').value) || 0;
  if (!steps && !mins) { document.getElementById('walkCalPreview').style.display='none'; return; }
  const settings = await Storage.getSettings();
  const weights = await Storage.getWeights();
  const wkg = weights[0]?.kg || 70;
  const calFromSteps = stepsToCalories(steps, wkg);
  const calFromTime = Math.round(mins * 4.5 * (wkg/70)); // ~4.5 MET walking
  const cal = steps ? calFromSteps : calFromTime;
  const preview = document.getElementById('walkCalPreview');
  preview.style.display = 'block';
  preview.innerHTML = `🔥 Estimated calories burned: <strong>${cal} kcal</strong>${steps ? ` from ${steps.toLocaleString()} steps` : ` from ${mins} min walk`}`;
}

async function logWalk() {
  const steps = parseInt(document.getElementById('walkSteps').value) || 0;
  const duration = parseInt(document.getElementById('walkDuration').value) || 0;
  const distance = parseFloat(document.getElementById('walkDistance').value) || 0;
  const date = document.getElementById('walkDate').value || Storage.today();
  if (!steps && !duration) { showToast('Enter steps or duration'); return; }
  const settings = await Storage.getSettings();
  const weights = await Storage.getWeights();
  const wkg = weights[0]?.kg || 70;
  const caloriesBurned = steps ? stepsToCalories(steps, wkg) : Math.round(duration * 4.5 * (wkg/70));
  const btn = document.getElementById('logWalkBtn');
  btn.disabled=true; btn.innerHTML='<span class="spinner"></span>';
  try {
    await Storage.addWalk({ steps, duration, distance, caloriesBurned, date });
    showToast(`✓ Walk logged! ~${caloriesBurned} kcal burned`);
    document.getElementById('walkSteps').value = '';
    document.getElementById('walkDuration').value = '';
    document.getElementById('walkDistance').value = '';
    document.getElementById('walkCalPreview').style.display = 'none';
    await refreshWalkData();
  } finally { btn.disabled=false; btn.innerHTML='<i class="fas fa-plus"></i> Log Walk'; }
}

async function saveWalkGoals() {
  const dailyStepsGoal = parseInt(document.getElementById('stepsGoalInput').value) || 8000;
  const walkMinsGoal = parseInt(document.getElementById('walkMinsGoal').value) || 30;
  await Storage.saveSettings({ dailyStepsGoal, walkMinsGoal });
  showToast('✓ Walk goals saved!');
  await refreshWalkData();
}

async function getWalkPlan() {
  const btn = document.getElementById('walkPlanBtn');
  btn.disabled=true; btn.innerHTML='<span class="spinner" style="border-top-color:var(--green-600)"></span> Getting plan...';
  const result = document.getElementById('walkPlanResult');
  result.style.display = 'block';
  result.innerHTML = '🤖 AI is creating your personalised walk plan...';
  try {
    const settings = await Storage.getSettings();
    const weights = await Storage.getWeights();
    const wkg = weights[0]?.kg;
    const target = settings.targetWeightKg;
    const prompt = `Create a practical 7-day walking plan for:
- Current weight: ${wkg ? wkg+'kg' : 'unknown'}
- Target weight: ${target ? target+'kg' : 'not set'}
- Daily steps goal: ${settings.dailyStepsGoal||8000}
- Activity level: ${settings.activityLevel||'moderate'}
Give day-by-day steps/duration targets, best times to walk, and 3 motivational tips. Keep it concise and actionable.`;
    const reply = await callGroq([{role:'user',content:prompt}],
      'You are a fitness coach. Give a practical, encouraging walking plan. Use simple formatting.');
    result.innerHTML = formatMessage(reply);
  } catch(e) { result.innerHTML = `<span style="color:var(--danger)">⚠️ ${escHtml(e.message)}</span>`; }
  finally { btn.disabled=false; btn.innerHTML='<i class="fas fa-robot"></i> Get AI Walk Plan for Me'; }
}

function renderWalkHistory(walks) {
  const el = document.getElementById('walkHistory');
  if (!walks.length) { el.innerHTML='<p class="empty-state">No walks logged yet.</p>'; return; }
  el.innerHTML = walks.map(w => {
    const d = new Date(w.date);
    const dateStr = d.toLocaleDateString('en-IN',{day:'numeric',month:'short'});
    return `<div class="weight-entry">
      <span class="weight-entry-date">${dateStr}</span>
      <span style="font-size:0.85rem;color:var(--ink)">${w.steps ? w.steps.toLocaleString()+' steps' : w.duration+' min'}</span>
      ${w.distance ? `<span style="font-size:0.78rem;color:var(--muted)">${w.distance}km</span>` : ''}
      <span style="font-size:0.78rem;color:var(--accent)">${w.caloriesBurned ? '~'+w.caloriesBurned+' kcal' : ''}</span>
      <button class="weight-entry-del" onclick="deleteWalk(${w.id})"><i class="fas fa-trash-alt"></i></button>
    </div>`;
  }).join('');
}

async function deleteWalk(id) {
  await Storage.deleteWalk(id); showToast('Walk removed'); await refreshWalkData();
}

function formatMessage(text) {
  return text.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\*(.*?)\*/g,'<em>$1</em>')
    .replace(/\n\n/g,'</p><p>').replace(/\n/g,'<br>').replace(/^/,'<p>').replace(/$/,'</p>');
}

initWalkPage();
</script>
</body>
</html>
