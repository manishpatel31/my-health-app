<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Weight Log — VitalGreen</title>
  <link rel="manifest" href="../manifest.json"/>
  <meta name="theme-color" content="#1c6b44"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <link rel="apple-touch-icon" href="../icons/icon-192.png"/>
  <link rel="icon" href="../icons/icon-192.png"/>
  <link rel="stylesheet" href="../css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Fraunces:ital,wght@0,300;0,600;1,300&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>
<nav class="navbar">
  <a href="../index.html" class="nav-brand"><span class="brand-leaf">🌿</span><span class="brand-name">VitalGreen</span></a>
  <div class="nav-links">
    <a href="../index.html" class="nav-link"><i class="fas fa-home"></i><span>Home</span></a>
    <a href="calories.html" class="nav-link"><i class="fas fa-utensils"></i><span>Calories</span></a>
    <a href="weight.html" class="nav-link active"><i class="fas fa-weight-scale"></i><span>Weight</span></a>
    <a href="walk.html" class="nav-link"><i class="fas fa-person-walking"></i><span>Walk</span></a>
    <a href="insights.html" class="nav-link"><i class="fas fa-chart-line"></i><span>Insights</span></a>
    <a href="tips.html" class="nav-link"><i class="fas fa-lightbulb"></i><span>Tips</span></a>
    <a href="coach.html" class="nav-link"><i class="fas fa-robot"></i><span>Coach</span></a>
    <a href="changelog.html" class="nav-link"><i class="fas fa-clock-rotate-left"></i><span>Changelog</span></a>
  </div>
</nav>

<main class="main-content">
  <div class="page-header">
    <h1 class="page-title">⚖️ Weight Log</h1>
    <p class="page-sub">Track progress toward your target weight</p>
  </div>

  <div id="bmiBanner" class="bmi-banner" style="display:none">
    <div class="bmi-score" id="bmiScore">—</div>
    <div class="bmi-details">
      <div class="bmi-label" id="bmiLabel">—</div>
      <div class="bmi-range" id="bmiRange"></div>
    </div>
  </div>

  <!-- Target Progress -->
  <div class="card" id="targetCard" style="display:none">
    <div class="card-title">Target Progress</div>
    <div style="display:flex;justify-content:space-between;margin-bottom:0.6rem;font-size:0.85rem">
      <span id="targetStart" style="color:var(--muted)"></span>
      <span id="targetGoal" style="color:var(--green-600);font-weight:600"></span>
    </div>
    <div class="progress-bar-wrap"><div class="progress-bar-fill" id="targetFill" style="width:0%"></div></div>
    <div style="text-align:center;margin-top:0.5rem;font-size:0.8rem;color:var(--muted)" id="targetPct"></div>
  </div>

  <div class="card">
    <div class="card-title">Log Weight</div>
    <div class="input-row">
      <div class="form-group">
        <label>Weight (kg)</label>
        <input type="number" id="weightInput" placeholder="e.g. 72.5" step="0.1" min="20" max="300"/>
      </div>
      <div class="form-group" style="max-width:145px">
        <label>Date</label>
        <input type="date" id="weightDate"/>
      </div>
    </div>
    <button class="btn-primary" onclick="logWeight()" id="logWeightBtn"><i class="fas fa-plus"></i> Log Weight</button>
  </div>

  <div class="card">
    <div class="card-title">Profile Settings (for BMI & Calorie Plan)</div>
    <div class="form-row">
      <div class="form-group">
        <label>Height (cm)</label>
        <input type="number" id="heightInput" placeholder="175" min="100" max="250"/>
      </div>
      <div class="form-group">
        <label>Target Weight (kg)</label>
        <input type="number" id="targetWeightInput" placeholder="65" step="0.1"/>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Age</label>
        <input type="number" id="ageInput" placeholder="28" min="10" max="100"/>
      </div>
      <div class="form-group">
        <label>Gender</label>
        <select id="genderInput"><option value="male">Male</option><option value="female">Female</option></select>
      </div>
    </div>
    <button class="btn-secondary" onclick="saveProfile()" style="width:100%"><i class="fas fa-save"></i> Save Profile</button>
  </div>

  <div class="card">
    <div class="card-title">Progress Chart</div>
    <canvas id="weightChart" height="200"></canvas>
  </div>

  <div class="card">
    <div class="card-title">History</div>
    <div id="weightHistory" class="weight-history"><p class="empty-state">No entries yet.</p></div>
  </div>
</main>

<nav class="bottom-nav">
  <a href="../index.html" class="bnav-link"><i class="fas fa-home"></i><span>Home</span></a>
  <a href="calories.html" class="bnav-link"><i class="fas fa-utensils"></i><span>Calories</span></a>
  <a href="weight.html" class="bnav-link active"><i class="fas fa-weight-scale"></i><span>Weight</span></a>
  <a href="walk.html" class="bnav-link"><i class="fas fa-person-walking"></i><span>Walk</span></a>
  <a href="insights.html" class="bnav-link"><i class="fas fa-chart-line"></i><span>Insights</span></a>
  <a href="tips.html" class="bnav-link"><i class="fas fa-lightbulb"></i><span>Tips</span></a>
  <a href="coach.html" class="bnav-link"><i class="fas fa-robot"></i><span>Coach</span></a>
  <a href="changelog.html" class="bnav-link"><i class="fas fa-clock-rotate-left"></i><span>Changelog</span></a>
</nav>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="../js/storage.js"></script>
<script src="../js/app.js"></script>
<script>
let weightChart=null;
async function initWeightPage() {
  document.getElementById('weightDate').value=Storage.today();
  const settings=await Storage.getSettings();
  if (settings.heightCm) document.getElementById('heightInput').value=settings.heightCm;
  if (settings.targetWeightKg) document.getElementById('targetWeightInput').value=settings.targetWeightKg;
  if (settings.age) document.getElementById('ageInput').value=settings.age;
  if (settings.gender) document.getElementById('genderInput').value=settings.gender;
  await refreshData();
}

async function refreshData() {
  const [weights,settings]=await Promise.all([Storage.getWeights(),Storage.getSettings()]);
  renderBMI(weights,settings);
  renderTarget(weights,settings);
  renderHistory(weights);
  renderChart(weights.slice(0,30).reverse());
}

async function logWeight() {
  const kg=parseFloat(document.getElementById('weightInput').value);
  const date=document.getElementById('weightDate').value;
  if (!kg||kg<20||kg>300) { showToast('Enter a valid weight'); return; }
  const btn=document.getElementById('logWeightBtn');
  btn.disabled=true; btn.innerHTML='<span class="spinner"></span>';
  try { await Storage.addWeight(kg,date); document.getElementById('weightInput').value=''; showToast('✓ Weight logged!'); await refreshData(); }
  finally { btn.disabled=false; btn.innerHTML='<i class="fas fa-plus"></i> Log Weight'; }
}

async function saveProfile() {
  const h=parseFloat(document.getElementById('heightInput').value);
  const tw=parseFloat(document.getElementById('targetWeightInput').value)||null;
  const age=parseInt(document.getElementById('ageInput').value)||null;
  const gender=document.getElementById('genderInput').value;
  if (!h||h<100||h>250) { showToast('Enter a valid height'); return; }
  await Storage.saveSettings({heightCm:h,targetWeightKg:tw,age,gender});
  showToast('✓ Profile saved!'); await refreshData();
}

async function deleteWeight(id) { await Storage.deleteWeight(id); showToast('Deleted'); await refreshData(); }

function renderBMI(weights,settings) {
  const banner=document.getElementById('bmiBanner'); if (!banner) return;
  if (!weights.length||!settings.heightCm) { banner.style.display='none'; return; }
  banner.style.display='flex';
  const h=settings.heightCm/100;
  const bmi=(weights[0].kg/(h*h)).toFixed(1);
  document.getElementById('bmiScore').textContent=bmi;
  document.getElementById('bmiLabel').textContent=bmiCategory(parseFloat(bmi));
  document.getElementById('bmiRange').textContent=`${weights[0].kg}kg · ${settings.heightCm}cm`;
  banner.className='bmi-banner';
  if (parseFloat(bmi)<18.5) banner.classList.add('underweight');
  else if (parseFloat(bmi)>=30) banner.classList.add('obese');
  else if (parseFloat(bmi)>=25) banner.classList.add('overweight');
}

function renderTarget(weights, settings) {
  const card=document.getElementById('targetCard');
  if (!weights.length||!settings.targetWeightKg) { card.style.display='none'; return; }
  card.style.display='block';
  const start=weights[weights.length-1].kg;
  const current=weights[0].kg;
  const target=settings.targetWeightKg;
  const totalNeeded=Math.abs(start-target);
  const achieved=Math.abs(start-current);
  const pct=totalNeeded>0?Math.min(100,Math.round(achieved/totalNeeded*100)):100;
  document.getElementById('targetStart').textContent=`Started: ${start}kg`;
  document.getElementById('targetGoal').textContent=`Target: ${target}kg`;
  document.getElementById('targetFill').style.width=pct+'%';
  document.getElementById('targetPct').textContent=`${pct}% of the way there · ${Math.abs(current-target).toFixed(1)}kg to go`;
}

function renderHistory(weights) {
  const el=document.getElementById('weightHistory'); if (!el) return;
  if (!weights.length) { el.innerHTML='<p class="empty-state">No entries yet.</p>'; return; }
  el.innerHTML=weights.slice(0,20).map((w,i)=>{
    const prev=weights[i+1];
    let delta='';
    if (prev) { const d=(w.kg-prev.kg).toFixed(1); const cls=d<=0?'delta-down':'delta-up'; delta=`<span class="weight-entry-delta ${cls}">${d>0?'+':''}${d}</span>`; }
    const dateStr=new Date(w.date).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'});
    return `<div class="weight-entry"><span class="weight-entry-date">${dateStr}</span><span class="weight-entry-val">${w.kg} kg</span>${delta}<button class="weight-entry-del" onclick="deleteWeight(${w.id})"><i class="fas fa-trash-alt"></i></button></div>`;
  }).join('');
}

function renderChart(weights) {
  const canvas=document.getElementById('weightChart'); if (!canvas) return;
  if (weightChart) { weightChart.destroy(); weightChart=null; }
  if (weights.length<2) {
    const ctx=canvas.getContext('2d'); canvas.height=160;
    ctx.fillStyle='#f4faf7'; ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle='#6b8070'; ctx.font='14px DM Sans,sans-serif'; ctx.textAlign='center';
    ctx.fillText('Log at least 2 entries to see chart',canvas.width/2,85); return;
  }
  weightChart=new Chart(canvas,{type:'line',data:{
    labels:weights.map(w=>new Date(w.date).toLocaleDateString('en-IN',{day:'numeric',month:'short'})),
    datasets:[{label:'Weight',data:weights.map(w=>w.kg),borderColor:'#2d8a55',backgroundColor:'rgba(45,138,85,0.08)',
      borderWidth:2.5,pointBackgroundColor:'#2d8a55',pointRadius:5,tension:0.4,fill:true}]},
    options:{responsive:true,plugins:{legend:{display:false},tooltip:{backgroundColor:'rgba(13,43,26,0.9)',padding:10,cornerRadius:10,callbacks:{label:ctx=>` ${ctx.raw} kg`}}},
      scales:{y:{grid:{color:'rgba(0,0,0,0.04)'},ticks:{font:{family:'DM Sans'},color:'#6b8070',callback:v=>v+' kg'}},
        x:{grid:{display:false},ticks:{font:{family:'DM Sans'},color:'#6b8070',maxRotation:45}}}}});
}

initWeightPage();
initLiveSync(refreshData);
</script>
</body>
</html>
