<script>
// Newest entry first. Add a new object to the TOP of this array whenever a feature
// batch ships — this page (and the "What's new" badge on home) reads straight from it.
const CHANGELOG = [
  {
    version: '1.8', date: '2026-06-17', title: 'Live sync, ownership-mismatch detection, stale-plan warning',
    items: [
      'Multi-device sync now refreshes on app focus/resume plus a background poll, instead of only on page load',
      'Detects when two devices use tokens from different GitHub accounts and explains why edits weren’t saving',
      'Sync failures now show a clear, specific error instead of silently wiping your data',
      'Home page daily action plan flags itself as stale once you’ve logged more food/steps, so you know to regenerate',
      'Added this changelog page',
    ]
  },
  {
    version: '1.7', date: '2026-06-17', title: 'Multi-device sync fixes',
    items: [
      'Auto-discovers your existing Gist on a new device instead of creating a duplicate empty one',
      'Setup now tests your GitHub token + Gist connection and tells you exactly what’s wrong',
      'Fixed today’s date calculation to use local time instead of UTC',
    ]
  },
  {
    version: '1.6', date: '2026-06-17', title: 'Time-bound weight-loss roadmap + grounded daily AI plan',
    items: [
      'Set a target weight with a day-count deadline instead of picking a weekly-loss rate',
      'Unsafe paces (>1 kg/week) are automatically capped with a warning and a realistic minimum timeline',
      'New Week/Month/3-Month/6-Month milestone roadmap, with optional AI phase-by-phase tips',
      'Home page "Today’s Action Plan": exact calories left, extra steps to burn off any overage, and steps remaining to hit your goal',
    ]
  },
  {
    version: '1.5', date: '2026-06-17', title: 'Gamification, water tracking, trends, PWA & reminders',
    items: [
      'Daily-logging streaks and earnable badges',
      'Water intake tracker with a hydration goal',
      '7-day calorie trend chart',
      'Installable PWA with offline support',
      'Local reminders for weigh-ins, meals and hydration',
      'Home page Energy Needs card (BMR/TDEE/deficit)',
    ]
  },
  {
    version: '1.4', date: '2026-06-17', title: 'Multi-item meal builder',
    items: [
      'Log a whole meal (multiple food items) at once instead of one at a time',
      'A single batched AI call analyses every item together',
    ]
  },
  {
    version: '1.3', date: '2026-06-17', title: 'Manual AI generation',
    items: [
      'AI insights only run when you tap Generate — no more automatic calls on every page load',
      'Generated responses are cached and shown until you regenerate them',
    ]
  },
  {
    version: '1.0', date: '2026-06-16', title: 'Glassmorphism redesign',
    items: [
      'New frosted-glass design system across every page',
      'Fixed bottom navigation missing Weight and Tips on mobile',
      'Simplified walk logging to one running daily step total',
    ]
  },
];

function renderChangelog() {
  const el = document.getElementById('changelogList');
  el.innerHTML = CHANGELOG.map((rel, i) => `
    <div class="card changelog-entry">
      <div class="changelog-head">
        <span class="changelog-version">v${rel.version}</span>
        <span class="changelog-date">${new Date(rel.date+'T00:00:00').toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'})}</span>
        ${i===0 ? '<span class="changelog-latest">Latest</span>' : ''}
      </div>
      <div class="card-title" style="margin-top:0.35rem">${rel.title}</div>
      <ul class="changelog-items">${rel.items.map(t=>`<li>${t}</li>`).join('')}</ul>
    </div>`).join('');
}

renderChangelog();
</script>
